name: Edge

# Publishes the bleeding-edge image from every push to master.
# Tag: ghcr.io/<owner>/<repo>:edge
#
# This is the equivalent of Grafana's :main, Caddy's :edge, or Traefik's :experimental.
# Not production-recommended — use :latest (stable) or a version pin instead.

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  packages: write

concurrency:
  group: edge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-edge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push :edge (multi-arch)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:edge
            ghcr.io/${{ github.repository }}:edge-${{ github.sha }}
          cache-from: type=gha,scope=edge
          cache-to: type=gha,mode=max,scope=edge
          # SUPPLY-02: SBOM + SLSA-3 provenance on edge images too.
          sbom: true
          provenance: mode=max
          build-args: |
            PB_VERSION=0.37.1
            S6_OVERLAY_VERSION=3.2.2.0
            HK_BUILD_ID=hk-edge-${{ github.sha }}
